<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="San José">
  <title>Comunidad San José</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --indigo: #4f46e5;
      --indigo-light: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
    }
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; }
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

    /* Animaciones */
    .fade-in { animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tarjetas */
    .card { background: white; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .btn-primary { background: var(--indigo); color: white; border-radius: 12px; padding: 12px 20px; font-weight: 600; transition: all .2s; }
    .btn-primary:hover { background: var(--indigo-light); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary { background: #f1f5f9; color: #334155; border-radius: 12px; padding: 10px 16px; font-weight: 500; transition: all .2s; }
    .btn-danger { background: #fef2f2; color: var(--red); border-radius: 12px; padding: 10px 16px; font-weight: 500; }

    /* Inputs */
    .input-field { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px 14px; font-size: 16px; outline: none; transition: border .2s; background: white; }
    .input-field:focus { border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }

    /* Nav bottom */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; z-index: 50; }
    .bottom-nav button { flex: 1; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 11px; color: #94a3b8; transition: color .2s; }
    .bottom-nav button.active { color: var(--indigo); }
    .bottom-nav button svg { width: 22px; height: 22px; }

    /* Badge */
    .badge-ingreso { background: #dcfce7; color: #15803d; font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
    .badge-egreso { background: #fee2e2; color: #dc2626; font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 600; }

    /* Toast */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 1000; transition: all .3s; }
    .toast-show { opacity: 1 !important; transform: translateX(-50%) translateY(0) !important; }
    .toast-hide { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; }
    .modal-sheet { background: white; border-radius: 24px 24px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); }
    .modal-handle { width: 40px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 20px; }

    .hidden { display: none !important; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>

<div id="loadingScreen" class="fixed inset-0 bg-indigo-600 flex flex-col items-center justify-center z-50">
  <div class="text-white text-center">
    <div class="text-5xl mb-4">⛪</div>
    <h1 class="text-2xl font-bold mb-1">San José</h1>
    <div class="mt-8 w-8 h-8 border-2 border-white border-t-transparent rounded-full spin mx-auto"></div>
  </div>
</div>

<div id="loginScreen" class="hidden min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-indigo-600 to-purple-700">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">⛪</div>
      <h1 class="text-3xl font-bold text-white">San José</h1>
      <p class="text-indigo-200 mt-1">Gestión Comunitaria</p>
    </div>
    <div class="card p-6 fade-in">
      <h2 class="text-lg font-semibold text-slate-700 mb-5">Iniciar Sesión</h2>
      <div class="space-y-4">
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Tu nombre</label>
          <input id="loginUser" type="text" placeholder="Ej: Danilo, Nora..." class="input-field" autocomplete="username">
        </div>
        <div>
          <label class="text-sm font-medium text-slate-600 block mb-1">Contraseña</label>
          <div class="relative">
            <input id="loginPass" type="password" placeholder="Contraseña" class="input-field pr-10" autocomplete="current-password">
            <button onclick="togglePass('loginPass')" class="absolute right-3 top-3.5 text-slate-400">👁</button>
          </div>
        </div>
        <button onclick="doLogin()" class="btn-primary w-full text-center">Entrar</button>
        <p id="loginError" class="text-red-500 text-sm text-center hidden"></p>
      </div>
    </div>
  </div>
</div>

<div id="changePassScreen" class="hidden min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-orange-500 to-amber-600">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-5xl mb-3">🔐</div>
      <h2 class="text-2xl font-bold text-white">Crear tu contraseña</h2>
      <p class="text-orange-100 mt-1 text-sm">Es tu primer ingreso. Debés crear una contraseña personal.</p>
    </div>
    <div class="card p-6 fade-in">
      <div class="space-y-4">
        <input id="newPass1" type="password" placeholder="Nueva contraseña" class="input-field">
        <input id="newPass2" type="password" placeholder="Confirmar contraseña" class="input-field">
        <button onclick="doChangePassword()" class="btn-primary w-full text-center">Guardar y continuar</button>
        <p id="changePassError" class="text-red-500 text-sm text-center hidden"></p>
      </div>
    </div>
  </div>
</div>

<div id="appScreen" class="hidden">
  <header class="bg-indigo-600 text-white px-4 pt-safe-top pb-3 safe-top">
    <div class="flex items-center justify-between">
      <h1 class="font-bold text-lg">San José ⛪</h1>
      <div class="flex items-center gap-3">
        <span id="userBadge" class="bg-indigo-500 text-xs px-3 py-1 rounded-full"></span>
        <button onclick="doLogout()" class="text-indigo-200 text-sm">Salir</button>
      </div>
    </div>
  </header>

  <main class="pb-24 min-h-screen">
    <div id="pageDashboard" class="page active p-4 fade-in">
      <div id="dashboardContent"></div>
    </div>

    <div id="pageMovimientos" class="page p-4 fade-in">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-slate-800 text-lg">Movimientos</h2>
        <div class="flex gap-2">
          <button onclick="exportPDF()" class="btn-secondary text-sm">📄 PDF</button>
          <button id="btnNuevoMov" onclick="openMovModal()" class="btn-primary text-sm hidden">+ Nuevo</button>
        </div>
      </div>
      <div class="card p-3 mb-4 grid grid-cols-2 gap-2">
        <input id="filterDesde" type="date" class="input-field text-sm py-2">
        <input id="filterHasta" type="date" class="input-field text-sm py-2">
        <select id="filterTipo" class="input-field text-sm py-2">
          <option value="todos">Todos</option>
          <option value="ingreso">Ingresos</option>
          <option value="egreso">Egresos</option>
        </select>
        <select id="filterCat" class="input-field text-sm py-2"><option value="todas">Todas</option></select>
        <button onclick="loadMovimientos()" class="btn-primary col-span-2 text-sm text-center">Filtrar</button>
      </div>
      <div id="movimientosList"></div>
    </div>

    <div id="pageUsuarios" class="page p-4 fade-in">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-slate-800 text-lg">Usuarios</h2>
        <button onclick="openUsuarioModal()" class="btn-primary text-sm">+ Nuevo</button>
      </div>
      <div id="usuariosList"></div>
    </div>

    <div id="pageLogs" class="page p-4 fade-in">
      <h2 class="font-bold text-slate-800 text-lg mb-4">Auditoría</h2>
      <div id="logsList"></div>
    </div>

    <div id="pageCuenta" class="page p-4 fade-in">
      <h2 class="font-bold text-slate-800 text-lg mb-4">Mi Cuenta</h2>
      <div class="card p-5 mb-4 flex items-center gap-4">
        <div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-xl">👤</div>
        <div><p id="cuentaNombre" class="font-bold text-slate-800"></p><p id="cuentaRol" class="text-slate-500 text-xs"></p></div>
      </div>
      <div class="card p-5">
        <h3 class="font-semibold text-slate-700 mb-4">Cambiar Contraseña</h3>
        <input id="cpNew1" type="password" placeholder="Nueva contraseña" class="input-field mb-3">
        <input id="cpNew2" type="password" placeholder="Confirmar contraseña" class="input-field mb-4">
        <button onclick="changeMyPassword()" class="btn-primary w-full text-center">Actualizar</button>
      </div>
    </div>
  </main>

  <nav class="bottom-nav safe-bottom">
    <button onclick="showPage('pageDashboard', this)" class="active" data-page="pageDashboard">🏠<span>Dashboard</span></button>
    <button onclick="showPage('pageMovimientos', this)" data-page="pageMovimientos">💰<span>Movimientos</span></button>
    <button id="navUsuarios" onclick="showPage('pageUsuarios', this)" data-page="pageUsuarios" class="hidden">👥<span>Usuarios</span></button>
    <button id="navLogs" onclick="showPage('pageLogs', this)" data-page="pageLogs" class="hidden">📜<span>Logs</span></button>
    <button onclick="showPage('pageCuenta', this)" data-page="pageCuenta">👤<span>Cuenta</span></button>
  </nav>
</div>

<div id="modalMovimiento" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 id="modalMovTitle" class="font-bold text-lg mb-4">Movimiento</h3>
    <input type="hidden" id="movId">
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <input id="movFecha" type="date" class="input-field">
        <select id="movTipo" class="input-field"><option value="ingreso">Ingreso</option><option value="egreso">Egreso</option></select>
      </div>
      <input id="movDesc" type="text" placeholder="Descripción" class="input-field">
      <div class="grid grid-cols-2 gap-3">
        <input id="movMonto" type="number" placeholder="Monto" class="input-field">
        <select id="movCategoria" class="input-field"></select>
      </div>
      <input id="movFile" type="file" accept="image/*,application/pdf" class="input-field text-sm">
      <div class="flex gap-3 pt-2">
        <button onclick="closeMovModal()" class="btn-secondary flex-1">Cancelar</button>
        <button onclick="saveMovimiento()" class="btn-primary flex-1">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div id="modalUsuario" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 id="modalUserTitle" class="font-bold text-lg mb-4">Usuario</h3>
    <input type="hidden" id="userId">
    <div class="space-y-4">
      <input id="userNombre" type="text" placeholder="Nombre" class="input-field">
      <select id="userRol" class="input-field"><option value="visor">Visor</option><option value="admin">Administrador</option></select>
      <div id="userActivoGroup" class="flex items-center gap-2"><input id="userActivo" type="checkbox" checked><span>Activo</span></div>
      <div class="flex gap-3"><button onclick="closeUsuarioModal()" class="btn-secondary flex-1">Cancelar</button><button onclick="saveUsuario()" class="btn-primary flex-1">Guardar</button></div>
    </div>
  </div>
</div>

<div id="toast" class="toast-hide"><div id="toastContent"></div></div>

<script>
let appState = { token: null, user: null, categorias: [], movimientos: [] };
window._movMap = {};

// --- COMUNICACIÓN API ---
// Dentro de tu <script> en index.html
async function api(action, data = {}) {
  try {
    const response = await fetch('/api', {
      method: 'POST', // SIEMPRE POST
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: action,
        token: appState.token || '',
        ...data
      })
    });

    const text = await response.text();
    
    try {
      return JSON.parse(text);
    } catch (e) {
      console.error("Respuesta no válida:", text);
      return { success: false, error: "Error de formato en el servidor" };
    }
  } catch (e) {
    console.error("Error de conexión:", e);
    return { success: false, error: "Verificá tu internet" };
  }
}

// Ejemplo de uso para el Login corregido
async function doLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  
  if (!u || !p) return;

  const res = await api('login', { username: u, password: p });
  
  if (res.success) {
    appState.token = res.token;
    appState.user = res.user;
    sessionStorage.setItem('sj_token', res.token);
    sessionStorage.setItem('sj_user', JSON.stringify(res.user));
    initApp();
  } else {
    alert(res.error || "Usuario o clave incorrecta");
  }
}

// --- LOGIN & INICIO ---
window.addEventListener('load', async () => {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  const t = sessionStorage.getItem('sj_token'), u = sessionStorage.getItem('sj_user');
  if (t && u) { appState.token = t; appState.user = JSON.parse(u); await initApp(); } 
  else showScreen('login');
});

async function doLogin() {
  const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value;
  if (!u || !p) return showError(document.getElementById('loginError'), 'Completá los campos');
  const res = await api('login', { username: u, password: p });
  if (res.success) {
    appState.token = res.token; appState.user = res.user;
    sessionStorage.setItem('sj_token', res.token); sessionStorage.setItem('sj_user', JSON.stringify(res.user));
    res.user.primerLogin ? showScreen('changePass') : await initApp();
  } else showError(document.getElementById('loginError'), res.error);
}

async function initApp() {
  const isAdmin = appState.user.rol === 'admin';
  document.getElementById('navUsuarios').classList.toggle('hidden', !isAdmin);
  document.getElementById('navLogs').classList.toggle('hidden', !isAdmin);
  document.getElementById('btnNuevoMov').classList.toggle('hidden', !isAdmin);
  document.getElementById('userBadge').textContent = appState.user.nombre;
  const res = await api('getCategorias');
  if (res.success) {
    appState.categorias = res.data;
    const s = ['movCategoria', 'filterCat'];
    s.forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = (id==='filterCat'?'<option value="todas">Todas</option>':'') + appState.categorias.map(c=>`<option value="${c.nombre}">${c.nombre}</option>`).join('');
    });
  }
  showScreen('app'); loadDashboard();
}

// --- DASHBOARD & MOVIMIENTOS ---
async function loadDashboard() {
  const res = await api('getDashboard');
  if (!res.success) return;
  const d = res.data, fmt = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n);
  document.getElementById('dashboardContent').innerHTML = `
    <div class="card p-5 mb-3 bg-indigo-600 text-white">
      <p class="text-indigo-200 text-sm">Saldo actual</p><p class="text-3xl font-bold">${fmt(d.saldo)}</p>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <div class="card p-4 text-green-600"><p class="text-xs">Ingresos</p><p class="font-bold">${fmt(d.totalIngresos)}</p></div>
      <div class="card p-4 text-red-500"><p class="text-xs">Egresos</p><p class="font-bold">${fmt(d.totalEgresos)}</p></div>
    </div>
    <div class="card p-4"><p class="font-bold text-slate-700 mb-2">Recientes</p>
      ${d.ultimos5.map(m=>`<div class="flex justify-between text-sm py-2 border-b last:border-0">
        <span>${m.descripcion}</span><span class="${m.tipo==='ingreso'?'text-green-600':'text-red-500'} font-bold">${fmt(m.monto)}</span>
      </div>`).join('')}
    </div>`;
}

async function loadMovimientos() {
  const p = { fechaDesde: document.getElementById('filterDesde').value, fechaHasta: document.getElementById('filterHasta').value, tipo: document.getElementById('filterTipo').value, categoria: document.getElementById('filterCat').value };
  const res = await api('getMovimientos', p);
  if (!res.success) return;
  appState.movimientos = res.data;
  document.getElementById('movimientosList').innerHTML = res.data.map(m => {
    window._movMap[m.id] = m;
    return `<div class="card p-4 mb-2 flex justify-between items-center">
      <div><p class="font-bold text-sm">${m.descripcion}</p><p class="text-xs text-slate-400">${m.fecha} · ${m.categoria}</p></div>
      <div class="text-right">
        <p class="font-bold ${m.tipo==='ingreso'?'text-green-600':'text-red-500'}">${m.tipo==='ingreso'?'+':'-'}$${m.monto}</p>
        ${appState.user.rol==='admin'?`<button onclick="openMovModal(window._movMap['${m.id}'])" class="text-indigo-500 text-xs">Editar</button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function saveMovimiento() {
  const data = { id: document.getElementById('movId').value, fecha: document.getElementById('movFecha').value, tipo: document.getElementById('movTipo').value, descripcion: document.getElementById('movDesc').value, monto: document.getElementById('movMonto').value, categoria: document.getElementById('movCategoria').value };
  const f = document.getElementById('movFile').files[0];
  if (f) { showToast('Subiendo archivo...'); data.driveFileId = await uploadToDrive(f); }
  const res = await api(data.id ? 'updateMovimiento' : 'createMovimiento', data);
  if (res.success) { showToast('Guardado'); closeMovModal(); loadMovimientos(); loadDashboard(); }
}

async function uploadToDrive(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = async (e) => {
      const res = await fetch('/api', {
        method: 'POST',
        body: JSON.stringify({ action: 'uploadFile', token: appState.token, fileName: file.name, mimeType: file.type, data: e.target.result.split(',')[1] })
      });
      const j = await res.json(); resolve(j.success ? j.fileId : '');
    };
    r.readAsDataURL(file);
  });
}

// --- UTILIDADES UI ---
function showScreen(s) { 
  ['loadingScreen','loginScreen','changePassScreen','appScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById(s+'Screen').classList.remove('hidden');
}
function showPage(p, b) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bottom-nav button').forEach(el=>el.classList.remove('active'));
  document.getElementById(p).classList.add('active'); b.classList.add('active');
  if(p==='pageDashboard') loadDashboard(); if(p==='pageMovimientos') loadMovimientos(); if(p==='pageUsuarios') loadUsuarios();
}
function openMovModal(m=null) {
  document.getElementById('movId').value = m?m.id:''; document.getElementById('movDesc').value = m?m.descripcion:'';
  document.getElementById('movMonto').value = m?m.monto:''; document.getElementById('modalMovimiento').classList.remove('hidden');
}
function closeMovModal() { document.getElementById('modalMovimiento').classList.add('hidden'); }
function showToast(m) { const t=document.getElementById('toast'); document.getElementById('toastContent').textContent=m; t.className='toast-show'; setTimeout(()=>t.className='toast-hide',3000); }
function togglePass(id) { const i=document.getElementById(id); i.type = i.type==='password'?'text':'password'; }
function showError(el, m) { el.textContent=m; el.classList.remove('hidden'); setTimeout(()=>el.classList.add('hidden'),3000); }
function doLogout() { sessionStorage.clear(); location.reload(); }
</script>
</body>
</html>
