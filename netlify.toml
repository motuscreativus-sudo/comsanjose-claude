# ============================================================
# COMUNIDAD SAN JOSÉ — Configuración Netlify
# Guardá este archivo en la RAÍZ del proyecto como: netlify.toml
# ============================================================

[build]
  publish = "public"   # Carpeta que contiene index.html, manifest.json, sw.js

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
